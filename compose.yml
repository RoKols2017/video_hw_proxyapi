name: video-hw-proxyapi

services:
  app:
    build:
      context: .
      target: development
    env_file:
      - .env
    command: python main.py
    volumes:
      - ./outputs:/app/outputs
    profiles:
      - cli
    stdin_open: true
    tty: true

  web:
    build:
      context: .
      target: development
    env_file:
      - .env
    command: python app.py
    ports:
      - "5000:5000"
    stdin_open: true
    tty: true

  status:
    build:
      context: .
      target: development
    env_file:
      - .env
    command: python test.py
    volumes:
      - ./outputs:/app/outputs
    profiles:
      - status
    stdin_open: true
    tty: true
