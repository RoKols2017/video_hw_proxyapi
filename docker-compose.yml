name: video-hw-proxyapi

services:
  app:
    build:
      context: .
      target: development
    env_file:
      - .env
    command: python main.py
    volumes:
      - ./outputs:/app/outputs
    restart: "no"
    profiles:
      - cli
    stdin_open: true
    tty: true

  web:
    build:
      context: .
      target: development
    env_file:
      - .env
    command: python app.py
    volumes:
      - ./outputs:/app/outputs
    ports:
      - "5000:5000"
    restart: unless-stopped

  bot:
    build:
      context: .
      target: development
    env_file:
      - .env
    command: python bot.py
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped

  status:
    build:
      context: .
      target: development
    env_file:
      - .env
    command: python test.py
    volumes:
      - ./outputs:/app/outputs
    restart: "no"
    profiles:
      - status
    stdin_open: true
    tty: true
