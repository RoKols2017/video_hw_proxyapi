<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video HW Proxy API</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <h1>Video HW Proxy API</h1>
    <p class="subtitle">Flask-интерфейс для генерации видео через общий backend service layer.</p>

    <form id="generate-form">
      <label for="prompt">Prompt</label>
      <textarea id="prompt" name="prompt" rows="5" required placeholder="Опиши сцену для генерации видео"></textarea>
      <button type="submit">Запустить генерацию</button>
    </form>

    <section id="task-section" class="hidden">
      <h2>Статус задачи</h2>
      <p><strong>Task ID:</strong> <span id="task-id">-</span></p>
      <p><strong>Video ID:</strong> <span id="video-id">-</span></p>
      <p><strong>Статус:</strong> <span id="status">-</span></p>
      <p><strong>Прогресс:</strong> <span id="progress-text">0%</span></p>

      <div class="progress-wrap">
        <div id="progress-bar" class="progress-bar"></div>
      </div>

      <p id="error" class="error"></p>
      <a id="download-link" class="hidden" href="#">Скачать MP4</a>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
