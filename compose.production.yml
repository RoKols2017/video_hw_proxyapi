name: video-hw-proxyapi

services:
  app:
    build:
      context: .
      target: production
    env_file:
      - .env
    command: python main.py
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    volumes:
      - ./outputs:/app/outputs
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "3"

  web:
    build:
      context: .
      target: production
    env_file:
      - .env
    command: python app.py
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "3"

  bot:
    build:
      context: .
      target: production
    env_file:
      - .env
    command: python bot.py
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    environment:
      NGINX_DOMAIN: ${NGINX_DOMAIN:?Set NGINX_DOMAIN at deploy time}
    ports:
      - "80:80"
      - "443:443"
    command:
      - /bin/sh
      - -c
      - envsubst '$$NGINX_DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=64m
      - /var/run:rw,noexec,nosuid,size=16m
      - /tmp:rw,noexec,nosuid,size=32m
    volumes:
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${SSL_CERTS_DIR:?Set SSL_CERTS_DIR at deploy time}:/etc/nginx/certs:ro
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "3"
